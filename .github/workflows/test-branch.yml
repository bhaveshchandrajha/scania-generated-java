name: Branch Test Runner

on:
  push:
    # This matches every push to every branch
    branches:
      - '**'
    # Optional: If you want to EXCLUDE the main branch, use:
    # - '!main'

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Change to 'gradle' if using Gradle

      - name: Run Spring Boot Tests
        id: run_tests
        # We use 'continue-on-error' so that the reporting step runs
        # even if the LLM code has failing tests.
        run: mvn test  # Change to './gradlew test' if using Gradle
        continue-on-error: true

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          # Surefire writes TEST-*.xml (see action-junit-report docs)
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          annotate_only: false
          detailed_summary: true
          include_passed: true
          verbose_summary: false

      - name: Stop Build if Tests Failed
        # This step manually fails the workflow if the previous 'Run' step failed
        # This ensures you still see a "Red X" on the branch if tests failed.
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
